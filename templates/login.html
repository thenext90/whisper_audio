<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔒 Login — AudioToText</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .login-card { max-width: 370px; margin: 4rem auto 0; }
    .login-logo { font-size: 2.2rem; text-align: center; margin-bottom: 1.2rem; }
    .login-error { color: #da3633; text-align: center; margin-bottom: 1rem; font-size: 0.98rem; }
    .login-form label { color: var(--text-muted); font-size: 0.93rem; font-weight: 600; }
    .login-form input { width: 100%; margin-bottom: 1.1rem; }
    .login-btn { width: 100%; }
  </style>
</head>
<body>
  <main>
    <div class="card login-card">
      <div class="login-logo">🔒 <b>AudioToText</b></div>
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <form class="login-form" method="post" autocomplete="off">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username" placeholder="Usuario" />
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Contraseña" />
        <button class="btn-primary login-btn" type="submit">Entrar</button>
      </form>
    </div>
  </main>
</body>
</html>
