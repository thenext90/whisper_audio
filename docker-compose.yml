services:
  audiototext:
    build: .
    container_name: audiototext_web
    restart: always
    ports:
      - "${PORT:-5001}:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./audio_transcription:/app/audio_transcription
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
