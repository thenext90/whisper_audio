services:
  audiototext:
    build: .
    container_name: audiototext_web
    restart: unless-stopped
    ports:
      - "${PORT:-5001}:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./audio_transcription:/app/audio_transcription
      - whisper_models:/root/.cache/whisper     # cachea los modelos descargados
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  whisper_models:
